<!DOCTYPE html>
<html>
<head>
    <title>Avi OS</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: url('bg.jpg') no-repeat center center/cover;
            height: 100vh;
            overflow: hidden;
            color: white;
        }

        .desktop {
            padding: 20px;
        }

        .icon {
            width: 80px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .icon img {
            width: 50px;
        }

        .window {
            position: absolute;
            top: 100px;
            left: 200px;
            width: 400px;
            background: #1e1e1e;
            border-radius: 8px;
            display: none;
        }

        .window-header {
            background: #333;
            padding: 10px;
            display: flex;
            justify-content: space-between;
        }

        .close {
            cursor: pointer;
            color: red;
        }

        .window-content {
            padding: 20px;
        }
    </style>
</head>

<body>

<div class="desktop">
    
    <div class="icon" onclick="openWindow()">
        <img src="https://cdn-icons-png.flaticon.com/512/716/716784.png">
        <div>My Work</div>
    </div>

</div>

<div class="window" id="window">
    <div class="window-header">
        <span>My Work</span>
        <span class="close" onclick="closeWindow()">X</span>
    </div>
    <div class="window-content">
        <p>This is your project section 🔥</p>
    </div>
</div>

<script>
function openWindow() {
    document.getElementById("window").style.display = "block";
}

function closeWindow() {
    document.getElementById("window").style.display = "none";
}
</script>

</body>
</html>
