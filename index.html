<!DOCTYPE html>
<html>
<head>
    <title>Avi OS</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;

            /* YOUR BACKGROUND */
            background-image: url('bg.jpg');
            background-size: cover;
            background-position: center top; /* prevents bad zoom */
            background-repeat: no-repeat;

            height: 100vh;
            overflow: hidden;
            color: white;
        }

        /* Dark overlay for better visibility */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.35);
            top: 0;
            left: 0;
            z-index: 0;
        }

        .desktop {
            position: relative;
            z-index: 1;
            padding: 20px;
        }

        .icon {
            width: 80px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .icon img {
            width: 50px;
        }

        .window {
            position: absolute;
            top: 120px;
            left: 200px;
            width: 420px;
            background: rgba(30,30,30,0.85);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            display: none;
            z-index: 2;
        }

        .window-header {
            background: rgba(50,50,50,0.9);
            padding: 10px;
            display: flex;
            justify-content: space-between;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
        }

        .close {
            cursor: pointer;
            color: #ff4d4d;
            font-weight: bold;
        }

        .window-content {
            padding: 20px;
        }
    </style>
</head>

<body>

<div class="desktop">

    <div class="icon" onclick="openWindow()">
        <img src="https://cdn-icons-png.flaticon.com/512/716/716784.png">
        <div>My Work</div>
    </div>

</div>

<div class="window" id="window">
    <div class="window-header">
        <span>My Work</span>
        <span class="close" onclick="closeWindow()">X</span>
    </div>
    <div class="window-content">
        <p>Your projects will go here 🔥</p>
    </div>
</div>

<script>
function openWindow() {
    document.getElementById("window").style.display = "block";
}

function closeWindow() {
    document.getElementById("window").style.display = "none";
}
</script>

</body>
</html>
