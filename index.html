<!DOCTYPE html>
<html>
<head>
<title>Avi OS</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  height: 100vh;
  width: 100vw;
  background: url('bg.jpg') no-repeat center center fixed;
  background-size: cover;
}

/* ICONS */
.icon {
  position: absolute !important;
  width: 80px;
  text-align: center;
  cursor: grab;
  user-select: none;
}

.icon img {
  width: 60px;
  pointer-events: none;
}

.icon span {
  display: block;
  margin-top: 5px;
  font-size: 14px;
  color: rgba(0,0,0,0.65);
}

.icon:hover {
  transform: scale(1.1);
}

/* WINDOWS */
.window {
  position: absolute;
  width: 500px;
  height: 350px;
  top: 120px;
  left: 200px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(20px);
  border-radius: 12px;
  padding: 15px;
  display: none;
  overflow: auto;
}

.close {
  position: absolute;
  right: 10px;
  top: 5px;
  color: red;
  cursor: pointer;
}

/* GRID */
.grid {
  display: flex;
  flex-wrap: wrap;
  gap: 25px;
  padding: 10px;
}

.file {
  width: 80px;
  text-align: center;
  cursor: pointer;
}

.file:hover {
  transform: scale(1.1);
}

.file span {
  display: block;
  margin-top: 5px;
  font-size: 13px;
}

/* DOCK */
.dock {
  position: fixed;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(20px);
  padding: 12px 25px;
  border-radius: 25px;
  display: flex;
}

.dock img {
  width: 42px;
  margin: 0 10px;
  cursor: pointer;
  transition: 0.3s;
}

.dock img:hover {
  transform: scale(1.3);
}
</style>
</head>

<body>

<!-- ICONS -->
<div class="icon" ondblclick="openPortfolio()">
  <img src="https://cdn-icons-png.flaticon.com/512/716/716784.png">
  <span>Portfolio</span>
</div>

<div class="icon" ondblclick="openResume()">
  <img src="https://cdn-icons-png.flaticon.com/512/337/337946.png">
  <span>Resume</span>
</div>

<div class="icon" ondblclick="openWindow('games')">
  <img src="https://cdn-icons-png.flaticon.com/512/833/833472.png">
  <span>Games ❤️</span>
</div>

<!-- WINDOW -->
<div id="window" class="window">
  <div class="close" onclick="closeWindow()">●</div>
  <div class="window-content"></div>
</div>

<!-- DOCK -->
<div class="dock">

<a href="https://wa.me/919537235783" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
</a>

<a href="mailto:avinash.nair274@gmail.com">

</a>

<a href="https://www.instagram.com/creeativeye" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
</a>

<a href="https://www.linkedin.com/in/avinash-nair-720230104" target="_blank">

</a>

</div>

<script>

/* WINDOW */
function openWindow(){
  document.getElementById("window").style.display = "block";
}
function closeWindow(){
  document.getElementById("window").style.display = "none";
}

/* RESUME */
function openResume(){
  window.open("resume.pdf","_blank");
}

/* RANDOM + DRAG */
window.onload = function(){

const icons = document.querySelectorAll(".icon");

icons.forEach(icon=>{

icon.style.left = Math.random()*(window.innerWidth-120)+"px";
icon.style.top = Math.random()*(window.innerHeight-180)+"px";

let offsetX,offsetY,isDragging=false,moved=false;

icon.addEventListener("mousedown",e=>{
if(e.button!==0) return;
isDragging=true;
moved=false;

offsetX=e.clientX-icon.offsetLeft;
offsetY=e.clientY-icon.offsetTop;

document.body.style.userSelect="none";
});

document.addEventListener("mousemove",e=>{
if(!isDragging) return;

moved=true;

icon.style.left=(e.clientX-offsetX)+"px";
icon.style.top=(e.clientY-offsetY)+"px";
});

document.addEventListener("mouseup",()=>{
isDragging=false;
document.body.style.userSelect="auto";
});

icon.ondragstart=()=>false;

});

};

/* PORTFOLIO SYSTEM */
let data={};

fetch("data.json")
.then(res=>res.json())
.then(d=>data=d);

function openPortfolio(){
openWindow();

document.querySelector(".window-content").innerHTML=`
<div class="grid">
<div class="file" onclick="openFolder('graphic')">📁<span>Graphic</span></div>
<div class="file" onclick="openFolder('clients')">📁<span>Clients</span></div>
</div>`;
}

function openFolder(type){
let items=data[type];

let html=`<div class="grid">`;

items.forEach(i=>{
html+=`
<div class="file" onclick="openImage('${i}')">
🖼️
<span>${i.split('/').pop()}</span>
</div>`;
});

html+=`</div>`;

document.querySelector(".window-content").innerHTML=html;
}

function openImage(src){
document.querySelector(".window-content").innerHTML=`
<div style="text-align:center">
<img src="${src}" style="max-width:100%;max-height:70vh;border-radius:10px;">
<br><br>
<button onclick="openPortfolio()">⬅ Back</button>
</div>`;
}

</script>

</body>
</html>
