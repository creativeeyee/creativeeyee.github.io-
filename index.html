<!DOCTYPE html>
<html>
<head>
    <title>Avi OS</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            overflow: hidden;
            color: white;
        }

        /* BACKGROUND FIX (NO BLACK EDGES + ZOOM CONTROL) */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;

            background: url('bg.jpg') center/cover no-repeat;

            transform: scale(0.92); /* 🔥 adjust 0.9–1 */
            transform-origin: center;

            filter: blur(6px) brightness(0.7);

            top: 0;
            left: 0;
            z-index: 0;
        }

        .desktop {
            position: relative;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* ICONS */
        .icon {
            position: absolute;
            width: 80px;
            text-align: center;
            cursor: grab;
            transition: transform 0.2s ease;
        }

        .icon:hover {
            transform: scale(1.15);
        }

        .icon img {
            width: 50px;
        }

        /* WINDOW */
        .window {
            position: absolute;
            top: 120px;
            left: 200px;
            width: 450px;
            background: rgba(30,30,30,0.9);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            display: none;
            z-index: 5;
        }

        .window-header {
            background: #333;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            cursor: move;
        }

        .close {
            cursor: pointer;
            color: red;
        }

        .window-content {
            padding: 20px;
        }

        /* DOCK */
        .dock {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);

            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);

            padding: 12px 22px;
            border-radius: 25px;

            display: flex;
            gap: 22px;

            z-index: 10;
        }

        .dock img {
            width: 42px;
            transition: all 0.25s ease;
            cursor: pointer;
        }

        .dock img:hover {
            transform: scale(1.5) translateY(-5px);
        }

    </style>
</head>

<body>

<div class="desktop">

    <!-- ICONS -->
    <div class="icon" style="top:60px; left:60px;" ondblclick="openWindow('work')">
        <img src="https://cdn-icons-png.flaticon.com/512/716/716784.png">
        <div>Work</div>
    </div>

    <div class="icon" style="top:160px; left:120px;" ondblclick="openWindow('about')">
        <img src="https://cdn-icons-png.flaticon.com/512/716/716784.png">
        <div>About</div>
    </div>

</div>

<!-- WINDOW -->
<div class="window" id="window">
    <div class="window-header">
        <span id="window-title">Window</span>
        <span class="close" onclick="closeWindow()">X</span>
    </div>
    <div class="window-content" id="window-content">
        Content
    </div>
</div>

<!-- DOCK -->
<div class="dock">
    <img src="https://cdn-icons-png.flaticon.com/512/5968/5968520.png" onclick="openWindow('work')" title="Work">
    <img src="https://cdn-icons-png.flaticon.com/512/5968/5968292.png" onclick="openWindow('about')" title="About">
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" onclick="openWindow('contact')" title="Contact">
</div>

<script>

// WINDOW CONTENT
function openWindow(type) {
    let win = document.getElementById("window");
    let title = document.getElementById("window-title");
    let content = document.getElementById("window-content");

    if(type === "work") {
        title.innerText = "My Work";
        content.innerHTML = "🔥 Your projects go here";
    }

    if(type === "about") {
        title.innerText = "About Me";
        content.innerHTML = "👋 Avi - Multimedia Designer";
    }

    if(type === "contact") {
        title.innerText = "Contact";
        content.innerHTML = "📩 Email / Instagram here";
    }

    win.style.display = "block";
}

function closeWindow() {
    document.getElementById("window").style.display = "none";
}


// DRAG ICONS
document.querySelectorAll(".icon").forEach(icon => {

    let offsetX, offsetY, isDragging = false;

    icon.addEventListener("mousedown", (e) => {
        isDragging = true;
        offsetX = e.clientX - icon.offsetLeft;
        offsetY = e.clientY - icon.offsetTop;
        icon.style.cursor = "grabbing";
    });

    document.addEventListener("mousemove", (e) => {
        if(isDragging) {
            icon.style.left = (e.clientX - offsetX) + "px";
            icon.style.top = (e.clientY - offsetY) + "px";
        }
    });

    document.addEventListener("mouseup", () => {
        isDragging = false;
        icon.style.cursor = "grab";
    });

});

</script>

</body>
</html>
