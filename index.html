<!DOCTYPE html>
<html>
<head>
<title>Avi OS</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: url('bg.jpg') no-repeat center center fixed;
    background-size: cover;
}

/* DESKTOP */
.desktop {
    width: 100vw;
    height: 100vh;
    position: relative;
}

/* ICON */
.icon {
    position: absolute;
    text-align: center;
    cursor: grab;
    transition: transform 0.2s;
}

.icon img {
    width: 70px;
}

.icon p {
    color: rgba(0,0,0,0.7);
    font-size: 14px;
}

.icon:hover {
    transform: scale(1.1);
}

/* WINDOW */
.window {
    position: absolute;
    width: 600px;
    height: 400px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(20px);
    border-radius: 12px;
    display: none;
    flex-direction: column;
    top: 100px;
    left: 200px;
}

/* HEADER */
.window-header {
    height: 40px;
    background: rgba(0,0,0,0.2);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 10px;
    cursor: move;
    color: white;
}

.close-btn {
    width: 14px;
    height: 14px;
    background: red;
    border-radius: 50%;
    cursor: pointer;
}

/* CONTENT */
.window-content {
    padding: 10px;
    overflow: auto;
    color: white;
}

/* GRID */
.grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

.grid img {
    width: 120px;
    border-radius: 6px;
    cursor: pointer;
}

/* VIEWER */
#viewer {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
    display: none;
    justify-content: center;
    align-items: center;
}

#viewer img {
    max-width: 80%;
    max-height: 80%;
    transition: transform 0.2s;
}

/* DOCK */
.dock {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    padding: 10px 20px;
    border-radius: 20px;
    display: flex;
    gap: 15px;
}

.dock img {
    width: 40px;
    transition: 0.2s;
}

.dock img:hover {
    transform: scale(1.2);
}
</style>
</head>

<body>

<div class="desktop">

<!-- PORTFOLIO ICON -->
<div class="icon" id="portfolioIcon" style="top:80px; left:80px;">
    <img src="https://cdn-icons-png.flaticon.com/512/716/716784.png">
    <p>Portfolio</p>
</div>

<!-- WINDOW -->
<div class="window" id="portfolioWindow">

    <div class="window-header" id="dragHeader">
        <span>Portfolio</span>
        <div class="close-btn" onclick="closeWindow()"></div>
    </div>

    <div class="window-content">

        <!-- FOLDER VIEW -->
        <div id="folderView">
            <div onclick="openFolder('graphic')">📁 Graphic Design</div>
            <div onclick="openFolder('clients')">📁 Clients</div>
        </div>

        <!-- IMAGE GRID -->
        <div id="imageGrid" style="display:none;">
            <button onclick="backToFolders()">⬅ Back</button>

            <div class="grid">
                <img src="img1.jpg" onclick="openViewer(this.src)">
                <img src="img2.jpg" onclick="openViewer(this.src)">
                <img src="img3.jpg" onclick="openViewer(this.src)">
            </div>
        </div>

    </div>
</div>

<!-- VIEWER -->
<div id="viewer">
    <span onclick="closeViewer()" style="position:absolute;top:20px;right:20px;color:white;font-size:20px;">❌</span>
    <img id="viewerImg">
</div>

<!-- DOCK -->
<div class="dock">
    <img src="https://cdn-icons-png.flaticon.com/512/5968/5968520.png">
    <img src="https://cdn-icons-png.flaticon.com/512/5968/5968292.png">
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
</div>

</div>

<script>

/* OPEN WINDOW */
document.getElementById("portfolioIcon").ondblclick = () => {
    document.getElementById("portfolioWindow").style.display = "flex";
};

function closeWindow() {
    document.getElementById("portfolioWindow").style.display = "none";
}

/* DRAG ICON */
document.querySelectorAll(".icon").forEach(icon => {
    let offsetX, offsetY, drag = false;

    icon.addEventListener("mousedown", (e) => {
        if(e.button !== 0) return;
        drag = true;
        offsetX = e.clientX - icon.offsetLeft;
        offsetY = e.clientY - icon.offsetTop;
        e.preventDefault();
    });

    document.addEventListener("mousemove", (e) => {
        if(!drag) return;
        icon.style.left = (e.clientX - offsetX) + "px";
        icon.style.top = (e.clientY - offsetY) + "px";
    });

    document.addEventListener("mouseup", () => drag = false);
});

/* DRAG WINDOW */
let win = document.getElementById("portfolioWindow");
let header = document.getElementById("dragHeader");

let dragging = false, x, y;

header.onmousedown = (e) => {
    dragging = true;
    x = e.clientX - win.offsetLeft;
    y = e.clientY - win.offsetTop;
};

document.onmousemove = (e) => {
    if(!dragging) return;
    win.style.left = (e.clientX - x) + "px";
    win.style.top = (e.clientY - y) + "px";
};

document.onmouseup = () => dragging = false;

/* FOLDER SYSTEM */
function openFolder() {
    document.getElementById("folderView").style.display = "none";
    document.getElementById("imageGrid").style.display = "block";
}

function backToFolders() {
    document.getElementById("folderView").style.display = "block";
    document.getElementById("imageGrid").style.display = "none";
}

/* VIEWER */
function openViewer(src) {
    document.getElementById("viewer").style.display = "flex";
    document.getElementById("viewerImg").src = src;
}

function closeViewer() {
    document.getElementById("viewer").style.display = "none";
}

/* ZOOM */
let scale = 1;
document.getElementById("viewer").addEventListener("wheel", (e) => {
    e.preventDefault();
    scale += e.deltaY < 0 ? 0.1 : -0.1;
    scale = Math.max(0.5, Math.min(scale, 3));
    document.getElementById("viewerImg").style.transform = `scale(${scale})`;
});

</script>

</body>
</html>
