<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avi OS</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: url('bg.jpg') no-repeat center center fixed;
    background-size: cover; /* clean full screen */
}

/* Desktop container */
.desktop {
    width: 100vw;
    height: 100vh;
    position: relative;
}

/* Folder icon */
.icon {
    position: absolute;
    text-align: center;
    cursor: grab;
    transition: transform 0.2s ease;
}

.icon img {
    width: 70px;
}

.icon p {
    color: rgba(0, 0, 0, 0.7); /* soft black */
    margin-top: 5px;
    font-size: 14px;
}

/* Hover effect */
.icon:hover {
    transform: scale(1.1);
}

/* Dock */
.dock {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    padding: 10px 20px;
    border-radius: 20px;
    display: flex;
    gap: 15px;
}

.dock img {
    width: 40px;
    transition: transform 0.2s;
}

.dock img:hover {
    transform: scale(1.2);
}
</style>
</head>

<body>

<div class="desktop">

    <!-- FOLDER 1 -->
    <div class="icon" style="top: 80px; left: 80px;">
        <img src="https://cdn-icons-png.flaticon.com/512/716/716784.png">
        <p>Work</p>
    </div>

    <!-- FOLDER 2 -->
    <div class="icon" style="top: 180px; left: 120px;">
        <img src="https://cdn-icons-png.flaticon.com/512/716/716784.png">
        <p>About</p>
    </div>

    <!-- DOCK -->
    <div class="dock">
        <img src="https://cdn-icons-png.flaticon.com/512/5968/5968520.png">
        <img src="https://cdn-icons-png.flaticon.com/512/5968/5968292.png">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
    </div>

</div>

<script>
document.querySelectorAll(".icon").forEach(icon => {

    let offsetX = 0;
    let offsetY = 0;
    let isDragging = false;

    icon.addEventListener("mousedown", (e) => {
        if (e.button !== 0) return; // only left click

        isDragging = true;

        offsetX = e.clientX - icon.offsetLeft;
        offsetY = e.clientY - icon.offsetTop;

        icon.style.cursor = "grabbing";

        e.preventDefault();
    });

    document.addEventListener("mousemove", (e) => {
        if (!isDragging) return;

        icon.style.left = (e.clientX - offsetX) + "px";
        icon.style.top = (e.clientY - offsetY) + "px";
    });

    document.addEventListener("mouseup", (e) => {
        if (e.button !== 0) return;

        isDragging = false;
        icon.style.cursor = "grab";
    });

    // Disable right click drag
    icon.addEventListener("contextmenu", (e) => {
        e.preventDefault();
    });

    // Safety reset
    window.addEventListener("mouseup", () => {
        isDragging = false;
    });

});
</script>

</body>
</html>
