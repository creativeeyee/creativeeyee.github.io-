<!DOCTYPE html>
<html>
<head>
<title>Avi OS</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  height: 100vh;
  width: 100vw;
  background: url('bg.jpg') no-repeat center center fixed;
  background-size: cover;
}

/* ICONS */
.icon {
  position: absolute !important;
  width: 80px;
  text-align: center;
  cursor: grab;
  user-select: none;
}

.icon:active {
  cursor: grabbing;
}

.icon img {
  width: 60px;
  pointer-events: none;
}

.icon span {
  display: block;
  margin-top: 5px;
  font-size: 14px;
  color: rgba(0,0,0,0.65);
}

.icon:hover {
  transform: scale(1.1);
}

/* WINDOWS */
.window {
  position: absolute;
  width: 400px;
  height: 300px;
  top: 120px;
  left: 200px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(20px);
  border-radius: 12px;
  padding: 15px;
  display: none;
}

.close {
  position: absolute;
  right: 10px;
  top: 5px;
  color: red;
  cursor: pointer;
}

/* DOCK */
.dock {
  position: fixed;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(20px);
  padding: 12px 25px;
  border-radius: 25px;
  display: flex;
  align-items: center;
  z-index: 999;
}

.dock img {
  width: 42px;
  margin: 0 10px;
  cursor: pointer;
  transition: 0.3s;
}

.dock img:hover {
  transform: scale(1.3);
}
</style>
</head>

<body>

<!-- ICONS -->
<div class="icon" ondblclick="openWindow('portfolio')">

<div class="icon" ondblclick="openWindow('games')">

<!-- SCRIPT -->
<script>

/* WINDOW */
function openWindow(id){
  document.getElementById(id).style.display = "block";
}

function closeWindow(id){
  document.getElementById(id).style.display = "none";
}

/* LOAD AFTER PAGE READY */
window.onload = function() {

  const icons = document.querySelectorAll(".icon");

  icons.forEach(icon => {

    /* RANDOM POSITION (NO CORNER BUG) */
    const x = Math.random() * (window.innerWidth - 120);
    const y = Math.random() * (window.innerHeight - 180);

    icon.style.left = x + "px";
    icon.style.top = y + "px";

    let offsetX = 0;
    let offsetY = 0;
    let isDragging = false;
    let moved = false;

    /* DRAG START */
    icon.addEventListener("mousedown", function(e) {
      if (e.button !== 0) return;

      isDragging = true;
      moved = false;

      offsetX = e.clientX - icon.offsetLeft;
      offsetY = e.clientY - icon.offsetTop;

      document.body.style.userSelect = "none";
    });

    /* DRAG MOVE */
    document.addEventListener("mousemove", function(e) {
      if (!isDragging) return;

      moved = true;

      icon.style.left = (e.clientX - offsetX) + "px";
      icon.style.top = (e.clientY - offsetY) + "px";
    });

    /* DRAG END */
    document.addEventListener("mouseup", function() {
      isDragging = false;
      document.body.style.userSelect = "auto";
    });

    /* PREVENT 🚫 BUG */
    icon.ondragstart = () => false;

  });

};

</script>

</body>
